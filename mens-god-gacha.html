<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MEN'S GOD — LUCKY DRAW</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b8963e;
  --gold-light: #e8c96a;
  --gold-dim: #7a6028;
  --bg: #080808;
  --bg2: #111;
  --bg3: #161616;
  --border: #222;
  --text: #e8e0cc;
  --text-dim: #666;
  --text-muted: #333;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  overflow: hidden;
  user-select: none;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  overflow: hidden;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ===== GOLD LINE ===== */
.gold-line {
  width: 100%; height: 2px; flex-shrink: 0;
  background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent);
}

/* ===== LOGO ===== */
.logo-block { text-align: center; }
.logo-en { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.3em; color: var(--gold); font-weight: 300; }
.logo-main { font-family: 'Cormorant Garamond', serif; font-size: 22px; letter-spacing: 0.25em; color: var(--gold-light); font-weight: 500; margin: 2px 0; }
.logo-sub { font-size: 9px; letter-spacing: 0.2em; color: var(--text-muted); font-weight: 300; }

.ornament { display: flex; align-items: center; gap: 8px; }
.orn-line { flex: 1; height: 0.5px; }
.orn-line.l { background: linear-gradient(90deg, transparent, var(--gold)); }
.orn-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
.orn-dia { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

/* ===== STAFF SCREEN ===== */
#staffScreen {
  background: var(--bg);
  justify-content: flex-start;
  overflow-y: auto;
}
.staff-inner {
  width: 100%; max-width: 480px;
  padding: 20px 20px 40px;
  display: flex; flex-direction: column; gap: 0;
}
.staff-header { padding: 16px 0 12px; display: flex; flex-direction: column; gap: 8px; }
.staff-title { font-size: 10px; letter-spacing: 0.25em; color: var(--text-dim); margin-top: 4px; }

.pack-editor { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.pack-editor-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.pack-emoji-input {
  width: 40px; height: 40px; font-size: 22px; text-align: center;
  background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px;
  color: var(--text); outline: none; cursor: pointer;
}
.pack-name-input {
  flex: 1; height: 40px; padding: 0 12px;
  background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 400;
  outline: none;
}
.pack-name-input:focus { border-color: var(--gold-dim); }

.prize-list { display: flex; flex-direction: column; gap: 8px; }
.prize-row {
  background: var(--bg3); border: 0.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; display: flex; align-items: center; gap: 8px;
}
.prize-row input[type="text"] {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-family: 'Jost', sans-serif; font-size: 13px; outline: none;
  min-width: 0;
}
.prize-row input[type="text"]::placeholder { color: var(--text-muted); }
.pct-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.pct-input {
  width: 52px; height: 30px; text-align: center;
  background: var(--bg); border: 0.5px solid var(--border); border-radius: 6px;
  color: var(--gold); font-family: 'Jost', sans-serif; font-size: 13px; outline: none;
}
.pct-input:focus { border-color: var(--gold-dim); }
.del-btn {
  width: 24px; height: 24px; border-radius: 50%; border: 0.5px solid var(--border);
  background: transparent; color: var(--text-dim); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.del-btn:hover { border-color: #c04040; color: #c04040; }

.add-prize-btn {
  margin-top: 8px; width: 100%; padding: 8px;
  border: 0.5px dashed var(--border); border-radius: 8px;
  background: transparent; color: var(--text-dim); font-size: 12px; letter-spacing: 0.1em;
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.add-prize-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

.pct-total { font-size: 11px; text-align: right; margin-top: 6px; }
.pct-ok { color: var(--gold); }
.pct-ng { color: #e05050; }

.staff-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.btn-reset {
  width: 100%; padding: 14px;
  border: 0.5px solid var(--gold); border-radius: 8px;
  background: transparent; color: var(--gold);
  font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 0.2em;
  cursor: pointer; transition: background 0.2s;
}
.btn-reset:hover { background: rgba(184,150,62,0.08); }
.btn-reset:active { background: rgba(184,150,62,0.15); }
.btn-save {
  width: 100%; padding: 14px;
  border: none; border-radius: 8px;
  background: var(--gold); color: #080808;
  font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.2em;
  cursor: pointer; transition: opacity 0.2s;
}
.btn-save:hover { opacity: 0.88; }

/* ===== SELECT SCREEN ===== */
#selectScreen { background: var(--bg); justify-content: center; }
.select-inner {
  width: 100%; max-width: 420px;
  padding: 0 24px;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.select-header { padding: 24px 0 16px; text-align: center; display: flex; flex-direction: column; gap: 8px; width: 100%; }
.select-hint { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; }

.packs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin: 20px 0; }

.pack-card {
  aspect-ratio: 0.7;
  border-radius: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.25s, transform 0.18s;
}
.pack-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(180deg, rgba(184,150,62,0.07), transparent);
}
.pack-card::after {
  content: '';
  position: absolute; inset: 5px;
  border: 0.5px solid rgba(184,150,62,0.15); border-radius: 6px;
  pointer-events: none;
}
.pack-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
.pack-card.selected {
  border-color: var(--gold);
  transform: translateY(-4px);
  box-shadow: 0 0 24px rgba(184,150,62,0.2), 0 8px 24px rgba(0,0,0,0.4);
}
.pack-card.selected::after { border-color: rgba(184,150,62,0.4); }

.pack-glow {
  position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
  width: 70%; height: 12px;
  background: radial-gradient(ellipse, rgba(184,150,62,0.35), transparent 70%);
  opacity: 0; transition: opacity 0.25s;
}
.pack-card.selected .pack-glow { opacity: 1; }

.pack-emoji-disp { font-size: 28px; position: relative; z-index: 1; }
.pack-name-disp { font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); text-align: center; position: relative; z-index: 1; padding: 0 4px; line-height: 1.3; }
.pack-star { font-size: 10px; color: var(--gold); opacity: 0.5; position: relative; z-index: 1; }

.btn-draw {
  width: 100%; padding: 15px;
  border: none; border-radius: 50px;
  background: var(--gold); color: #080808;
  font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.25em;
  cursor: pointer; opacity: 0.35;
  transition: opacity 0.25s, transform 0.15s;
  margin-bottom: 8px;
}
.btn-draw.enabled { opacity: 1; }
.btn-draw.enabled:active { transform: scale(0.97); }

/* ===== OPEN SCREEN ===== */
#openScreen { background: var(--bg); justify-content: center; }
.open-bg-radial {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 45%, #1a1200 0%, var(--bg) 65%);
  opacity: 0; transition: opacity 0.6s ease;
}
#openScreen.active .open-bg-radial { opacity: 1; }

.rays-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; }
.ray {
  position: absolute; width: 1.5px;
  background: linear-gradient(180deg, rgba(184,150,62,0.5), transparent);
  transform-origin: bottom center;
}

.open-inner {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  width: 100%; padding: 0 40px;
}
.open-label { font-size: 10px; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 24px; opacity: 0.7; }

/* パック本体 */
.pack-visual { position: relative; width: 160px; height: 220px; cursor: grab; touch-action: none; }
.pack-top-half {
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: var(--bg2); border-radius: 12px 12px 0 0;
  border: 1.5px solid var(--gold); border-bottom: none;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;
  overflow: hidden;
  transform-origin: bottom center;
  transition: transform 0.0s;
}
.pack-bottom-half {
  position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
  background: var(--bg3); border-radius: 0 0 12px 12px;
  border: 1.5px solid var(--border); border-top: none;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px;
  overflow: hidden;
}
.pack-top-shine {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, rgba(184,150,62,0.12) 0%, transparent 60%);
}
.pack-top-emoji { font-size: 36px; position: relative; z-index: 1; }
.pack-top-name { font-size: 10px; letter-spacing: 0.18em; color: var(--gold); position: relative; z-index: 1; }
.pack-light-burst {
  position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 30px;
  background: radial-gradient(ellipse, rgba(232,201,106,0.9) 0%, rgba(184,150,62,0.4) 40%, transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.pack-light-beam {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 60px; height: 80px;
  background: linear-gradient(0deg, rgba(232,201,106,0.6), rgba(184,150,62,0.2), transparent);
  clip-path: polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%);
  opacity: 0;
}
.pack-bottom-mg { font-size: 11px; letter-spacing: 0.2em; color: var(--text-muted); }
.pack-bottom-deco { width: 40px; height: 0.5px; background: var(--border); }

.swipe-hint { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.swipe-arrow { font-size: 16px; color: var(--gold); opacity: 0.5; animation: bounce 1.5s ease-in-out infinite; }
.swipe-text { font-size: 10px; letter-spacing: 0.15em; color: var(--text-muted); }
@keyframes bounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-5px); } }

/* ===== RESULT SCREEN ===== */
#resultScreen { justify-content: center; }
.result-bg { position: absolute; inset: 0; transition: background 0.5s; }

.particles { position: absolute; inset: 0; pointer-events: none; }
.pt {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  opacity: 0; animation: ptFly 1.2s ease-out forwards;
}
@keyframes ptFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

.result-inner {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 32px; width: 100%; max-width: 400px;
}
.result-congrats { font-size: 9px; letter-spacing: 0.3em; color: var(--gold); margin-bottom: 12px; opacity: 0; transition: opacity 0.5s 0.3s; }
#resultScreen.revealed .result-congrats { opacity: 1; }

/* カード */
.result-card {
  width: 160px; height: 210px; border-radius: 10px; position: relative; margin-bottom: 16px;
  opacity: 0; transform: scale(0.8) translateY(20px);
  transition: opacity 0.5s 0.2s, transform 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
#resultScreen.revealed .result-card { opacity: 1; transform: scale(1) translateY(0); }

.card-body {
  width: 100%; height: 100%; border-radius: 10px;
  background: var(--bg2); border: 1.5px solid var(--gold);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; overflow: hidden; position: relative;
}
.card-holo { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(184,150,62,0.1), rgba(232,201,106,0.15), rgba(184,150,62,0.05)); }
.card-corner { position: absolute; width: 14px; height: 14px; border-color: var(--gold); border-style: solid; border-width: 0; }
.card-corner.tl { top: 6px; left: 6px; border-top-width: 1px; border-left-width: 1px; }
.card-corner.tr { top: 6px; right: 6px; border-top-width: 1px; border-right-width: 1px; }
.card-corner.bl { bottom: 6px; left: 6px; border-bottom-width: 1px; border-left-width: 1px; }
.card-corner.br { bottom: 6px; right: 6px; border-bottom-width: 1px; border-right-width: 1px; }
.card-emoji { font-size: 48px; position: relative; z-index: 1; }
.card-pack-name { font-size: 9px; letter-spacing: 0.2em; color: var(--gold); position: relative; z-index: 1; }
.card-prize-name { font-size: 13px; color: var(--text); font-weight: 400; text-align: center; position: relative; z-index: 1; padding: 0 10px; line-height: 1.4; font-family: 'Cormorant Garamond', serif; }
.card-glow-edge { position: absolute; inset: -2px; border-radius: 12px; border: 1.5px solid rgba(232,201,106,0.5); pointer-events: none; }
.card-glow-bottom { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 80%; height: 14px; background: radial-gradient(ellipse, rgba(232,201,106,0.6), transparent 70%); }

/* ハズレカード */
.card-body.lose { border-color: var(--border); }
.card-body.lose .card-holo { background: none; }
.card-body.lose .card-corner { border-color: var(--border); opacity: 0.4; }
.card-glow-edge.lose { border-color: transparent; }
.card-glow-bottom.lose { opacity: 0; }

.result-prize-name {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text); text-align: center; margin-bottom: 4px;
  opacity: 0; transition: opacity 0.5s 0.4s;
}
#resultScreen.revealed .result-prize-name { opacity: 1; }
.result-desc {
  font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.7; margin-bottom: 20px;
  opacity: 0; transition: opacity 0.5s 0.5s;
}
#resultScreen.revealed .result-desc { opacity: 1; }

.result-show {
  font-size: 11px; letter-spacing: 0.15em; color: var(--gold);
  border-top: 0.5px solid var(--border); padding-top: 14px; width: 100%; text-align: center;
  opacity: 0; transition: opacity 0.5s 0.6s;
}
#resultScreen.revealed .result-show { opacity: 1; }
.result-show.lose { color: var(--text-muted); }

.sparks { position: absolute; inset: 0; pointer-events: none; }
.spark { position: absolute; font-size: 12px; color: var(--gold); opacity: 0; animation: sparkle 2s ease-in-out infinite; }
@keyframes sparkle { 0%,100%{ opacity:0; transform:scale(0.5); } 50%{ opacity:0.6; transform:scale(1); } }

/* ハズレ背景 */
.lose-bg { background: var(--bg) !important; }
</style>
</head>
<body>

<!-- ===== STAFF SCREEN ===== -->
<div id="staffScreen" class="screen active">
  <div class="gold-line"></div>
  <div class="staff-inner">
    <div class="staff-header">
      <div class="logo-block">
        <div class="logo-en">MEN'S GOD</div>
        <div class="logo-main">MANAGEMENT</div>
      </div>
      <div class="ornament"><div class="orn-line l"></div><div class="orn-dia"></div><div class="orn-line r"></div></div>
      <div class="staff-title">パック設定 / 景品・確率編集</div>
    </div>

    <div id="packEditors"></div>

    <div class="staff-actions">
      <button class="btn-save" onclick="saveAndReset()">保存してお客様に渡す</button>
      <button class="btn-reset" onclick="goToSelect()">保存せずにお客様画面へ</button>
    </div>
  </div>
</div>

<!-- ===== SELECT SCREEN ===== -->
<div id="selectScreen" class="screen">
  <div class="gold-line"></div>
  <div class="select-inner">
    <div class="select-header">
      <div class="logo-block">
        <div class="logo-en">MEN'S GOD</div>
        <div class="logo-main">LUCKY DRAW</div>
        <div class="logo-sub">スキンケアプレゼント抽選</div>
      </div>
      <div class="ornament"><div class="orn-line l"></div><div class="orn-dia"></div><div class="orn-line r"></div></div>
      <div class="select-hint">引きたいパックを1つ選んでください</div>
    </div>

    <div class="packs-grid" id="packsGrid"></div>

    <button class="btn-draw" id="btnDraw" onclick="startOpen()">くじを引く</button>
  </div>
</div>

<!-- ===== OPEN SCREEN ===== -->
<div id="openScreen" class="screen">
  <div class="open-bg-radial"></div>
  <div class="rays-wrap" id="raysWrap"></div>
  <div class="gold-line" style="position:absolute;top:0;left:0;right:0;z-index:3;"></div>

  <div class="open-inner">
    <div class="open-label">OPENING</div>
    <div class="pack-visual" id="packVisual">
      <div class="pack-top-half" id="packTop">
        <div class="pack-top-shine"></div>
        <div class="pack-top-emoji" id="openEmoji">🧴</div>
        <div class="pack-top-name" id="openName">SKIN CARE</div>
        <div class="pack-light-burst" id="lightBurst"></div>
        <div class="pack-light-beam" id="lightBeam"></div>
      </div>
      <div class="pack-bottom-half">
        <div class="pack-bottom-mg">MEN'S GOD</div>
        <div class="pack-bottom-deco"></div>
      </div>
    </div>
    <div class="swipe-hint" id="swipeHint">
      <div class="swipe-arrow">↑</div>
      <div class="swipe-text">上にスワイプして開封</div>
    </div>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="resultScreen" class="screen">
  <div class="result-bg" id="resultBg"></div>
  <div class="sparks" id="sparks"></div>
  <div class="particles" id="particles"></div>
  <div class="gold-line" style="position:absolute;top:0;left:0;right:0;z-index:3;"></div>

  <div class="result-inner">
    <div class="result-congrats" id="resultCongrats">✦ CONGRATULATIONS ✦</div>
    <div class="result-card" id="resultCard">
      <div class="card-glow-edge" id="cardGlowEdge"></div>
      <div class="card-body" id="cardBody">
        <div class="card-holo"></div>
        <div class="card-corner tl"></div><div class="card-corner tr"></div>
        <div class="card-corner bl"></div><div class="card-corner br"></div>
        <div class="card-emoji" id="cardEmoji">🧴</div>
        <div class="card-pack-name" id="cardPackName">SKIN CARE</div>
        <div class="card-prize-name" id="cardPrizeName">フェイシャルケアセット</div>
      </div>
      <div class="card-glow-bottom" id="cardGlowBottom"></div>
    </div>
    <div class="result-prize-name" id="resultPrizeName">フェイシャルケアセット</div>
    <div class="result-desc" id="resultDesc">スタッフにこの画面をお見せください</div>
    <div class="result-show" id="resultShow">この画面をスタッフにお見せください</div>
  </div>
</div>

<!-- 長押しで管理画面 -->
<div id="staffTrigger" style="position:fixed;bottom:0;right:0;width:60px;height:60px;z-index:999;opacity:0;"></div>

<script>
// ===== DATA =====
const DEFAULT_PACKS = [
  {
    name: '化粧水', emoji: '💧',
    prizes: [
      { name: '化粧水 200ml', pct: 15 },
      { name: '化粧水 100ml', pct: 25 },
      { name: 'ミニサイズ 30ml', pct: 30 },
      { name: 'ハズレ', pct: 30, lose: true }
    ]
  },
  {
    name: 'フェイスパック', emoji: '🎭',
    prizes: [
      { name: 'プレミアムパック 5枚', pct: 15 },
      { name: 'パック 3枚セット', pct: 25 },
      { name: 'パック 1枚', pct: 30 },
      { name: 'ハズレ', pct: 30, lose: true }
    ]
  },
  {
    name: '日焼け止め', emoji: '☀️',
    prizes: [
      { name: 'SPF50+ 大容量', pct: 15 },
      { name: 'SPF50 レギュラー', pct: 25 },
      { name: 'SPF30 ミニ', pct: 30 },
      { name: 'ハズレ', pct: 30, lose: true }
    ]
  }
];

let packs = JSON.parse(localStorage.getItem('mgPacks') || 'null') || DEFAULT_PACKS;
let selectedPack = null;

// ===== STAFF UI =====
function renderStaffUI() {
  const container = document.getElementById('packEditors');
  container.innerHTML = '';
  packs.forEach((pack, pi) => {
    const el = document.createElement('div');
    el.className = 'pack-editor';
    el.innerHTML = `
      <div class="pack-editor-header">
        <input class="pack-emoji-input" value="${pack.emoji}" maxlength="2"
          oninput="packs[${pi}].emoji=this.value">
        <input class="pack-name-input" value="${pack.name}" placeholder="パック名"
          oninput="packs[${pi}].name=this.value">
      </div>
      <div class="prize-list" id="prizeList${pi}"></div>
      <div class="pct-total" id="pctTotal${pi}"></div>
      <button class="add-prize-btn" onclick="addPrize(${pi})">＋ 景品を追加</button>
    `;
    container.appendChild(el);
    renderPrizes(pi);
  });
}

function renderPrizes(pi) {
  const list = document.getElementById('prizeList' + pi);
  list.innerHTML = '';
  packs[pi].prizes.forEach((prize, ri) => {
    const row = document.createElement('div');
    row.className = 'prize-row';
    row.innerHTML = `
      <input type="text" value="${prize.name}" placeholder="景品名"
        oninput="packs[${pi}].prizes[${ri}].name=this.value">
      <span class="pct-label">確率</span>
      <input class="pct-input" type="number" min="0" max="100" value="${prize.pct}"
        oninput="packs[${pi}].prizes[${ri}].pct=Number(this.value);updateTotal(${pi})">
      <span class="pct-label">%</span>
      <button class="del-btn" onclick="deletePrize(${pi},${ri})">×</button>
    `;
    list.appendChild(row);
  });
  updateTotal(pi);
}

function updateTotal(pi) {
  const total = packs[pi].prizes.reduce((s, p) => s + (Number(p.pct) || 0), 0);
  const el = document.getElementById('pctTotal' + pi);
  el.textContent = `合計: ${total}%`;
  el.className = 'pct-total ' + (total === 100 ? 'pct-ok' : 'pct-ng');
}

function addPrize(pi) {
  packs[pi].prizes.push({ name: '', pct: 0 });
  renderPrizes(pi);
}
function deletePrize(pi, ri) {
  if (packs[pi].prizes.length <= 1) return;
  packs[pi].prizes.splice(ri, 1);
  renderPrizes(pi);
}

function saveAndReset() {
  // バリデーション
  for (let i = 0; i < packs.length; i++) {
    const total = packs[i].prizes.reduce((s, p) => s + (Number(p.pct)||0), 0);
    if (total !== 100) {
      alert(`「${packs[i].name}」の確率合計が${total}%です。100%になるよう調整してください。`);
      return;
    }
  }
  localStorage.setItem('mgPacks', JSON.stringify(packs));
  goToSelect();
}

function goToSelect() {
  selectedPack = null;
  renderSelectUI();
  showScreen('selectScreen');
}

// ===== SELECT UI =====
function renderSelectUI() {
  const grid = document.getElementById('packsGrid');
  grid.innerHTML = '';
  packs.forEach((pack, i) => {
    const card = document.createElement('div');
    card.className = 'pack-card';
    card.innerHTML = `
      <div class="pack-glow"></div>
      <div class="pack-emoji-disp">${pack.emoji}</div>
      <div class="pack-name-disp">${pack.name}</div>
      <div class="pack-star">✦</div>
    `;
    card.onclick = () => selectPack(i);
    grid.appendChild(card);
  });
  document.getElementById('btnDraw').classList.remove('enabled');
}

function selectPack(idx) {
  selectedPack = idx;
  document.querySelectorAll('.pack-card').forEach((c, i) => {
    c.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnDraw').classList.add('enabled');
}

// ===== LOTTERY =====
function drawPrize(pack) {
  const rand = Math.random() * 100;
  let cum = 0;
  for (const p of pack.prizes) {
    cum += Number(p.pct);
    if (rand < cum) return p;
  }
  return pack.prizes[pack.prizes.length - 1];
}

// ===== OPEN SCREEN =====
let swipeStartY = null;
let swipeProgress = 0;
let drawn = false;
let currentResult = null;

function startOpen() {
  if (selectedPack === null) return;
  const pack = packs[selectedPack];
  document.getElementById('openEmoji').textContent = pack.emoji;
  document.getElementById('openName').textContent = pack.name.toUpperCase();

  // 抽選実行
  currentResult = drawPrize(pack);
  drawn = false;
  swipeProgress = 0;
  swipeStartY = null;

  // 光演出（当選時のみ）
  const isWin = !currentResult.lose;
  document.getElementById('lightBurst').style.opacity = '0';
  document.getElementById('lightBeam').style.opacity = '0';
  document.getElementById('packTop').style.transform = '';
  document.getElementById('swipeHint').style.opacity = '1';

  // レイ初期化
  buildRays(isWin);

  showScreen('openScreen');

  // スワイプリスナー
  const visual = document.getElementById('packVisual');
  visual.addEventListener('touchstart', onTouchStart, { passive: true });
  visual.addEventListener('touchmove', onTouchMove, { passive: false });
  visual.addEventListener('touchend', onTouchEnd);
  visual.addEventListener('mousedown', onMouseDown);
}

function buildRays(isWin) {
  const wrap = document.getElementById('raysWrap');
  wrap.innerHTML = '';
  if (!isWin) return;
  const count = 16;
  for (let i = 0; i < count; i++) {
    const ray = document.createElement('div');
    ray.className = 'ray';
    const angle = (360 / count) * i;
    const len = 80 + Math.random() * 40;
    ray.style.cssText = `height:${len}px; transform: rotate(${angle}deg) translateY(-${len/2}px);`;
    wrap.appendChild(ray);
  }
  wrap.style.opacity = '0';
}

function onTouchStart(e) { swipeStartY = e.touches[0].clientY; }
function onMouseDown(e) {
  swipeStartY = e.clientY;
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onTouchMove(e) {
  e.preventDefault();
  if (swipeStartY === null || drawn) return;
  const dy = swipeStartY - e.touches[0].clientY;
  applySwipe(dy);
}
function onMouseMove(e) {
  if (swipeStartY === null || drawn) return;
  const dy = swipeStartY - e.clientY;
  applySwipe(dy);
}

function applySwipe(dy) {
  const progress = Math.min(Math.max(dy / 160, 0), 1);
  swipeProgress = progress;
  const packTop = document.getElementById('packTop');
  packTop.style.transform = `translateY(${-progress * 120}px) rotate(${progress * -8}deg)`;
  packTop.style.opacity = 1 - progress * 0.3;

  const isWin = !currentResult.lose;
  if (progress > 0.3 && isWin) {
    document.getElementById('lightBurst').style.opacity = String((progress - 0.3) / 0.7);
    document.getElementById('lightBeam').style.opacity = String((progress - 0.3) / 0.7 * 0.8);
    document.getElementById('raysWrap').style.opacity = String((progress - 0.3) / 0.7 * 0.8);
  }
  if (progress > 0.5) {
    document.getElementById('swipeHint').style.opacity = String(1 - (progress - 0.5) * 4);
  }
  if (progress >= 1 && !drawn) {
    drawn = true;
    setTimeout(() => showResult(), 200);
  }
}

function onTouchEnd() { if (swipeProgress < 1) snapBack(); }
function onMouseUp() {
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
  if (swipeProgress < 1) snapBack();
}
function snapBack() {
  const packTop = document.getElementById('packTop');
  packTop.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  packTop.style.transform = '';
  packTop.style.opacity = '1';
  document.getElementById('lightBurst').style.opacity = '0';
  document.getElementById('lightBeam').style.opacity = '0';
  document.getElementById('raysWrap').style.opacity = '0';
  setTimeout(() => { packTop.style.transition = ''; }, 300);
  swipeStartY = null; swipeProgress = 0;
}

// ===== RESULT =====
function showResult() {
  const pack = packs[selectedPack];
  const result = currentResult;
  const isWin = !result.lose;

  // カード設定
  document.getElementById('cardEmoji').textContent = pack.emoji;
  document.getElementById('cardPackName').textContent = pack.name.toUpperCase();
  document.getElementById('cardPrizeName').textContent = result.name;
  document.getElementById('resultPrizeName').textContent = result.name;

  if (isWin) {
    document.getElementById('resultBg').style.background =
      'radial-gradient(ellipse at 50% 30%, #1e1600 0%, #080808 65%)';
    document.getElementById('cardBody').classList.remove('lose');
    document.getElementById('cardGlowEdge').classList.remove('lose');
    document.getElementById('cardGlowBottom').classList.remove('lose');
    document.getElementById('resultCongrats').textContent = '✦ CONGRATULATIONS ✦';
    document.getElementById('resultCongrats').style.color = 'var(--gold)';
    document.getElementById('resultDesc').textContent = 'おめでとうございます！';
    document.getElementById('resultShow').textContent = 'この画面をスタッフにお見せください';
    document.getElementById('resultShow').classList.remove('lose');
    buildSparks();
    setTimeout(() => buildParticles(), 300);
  } else {
    document.getElementById('resultBg').style.background = 'var(--bg)';
    document.getElementById('cardBody').classList.add('lose');
    document.getElementById('cardGlowEdge').classList.add('lose');
    document.getElementById('cardGlowBottom').classList.add('lose');
    document.getElementById('resultCongrats').textContent = '— THANK YOU —';
    document.getElementById('resultCongrats').style.color = 'var(--text-muted)';
    document.getElementById('resultDesc').textContent = '残念！またのお楽しみに。';
    document.getElementById('resultShow').textContent = 'またのご来店をお待ちしております';
    document.getElementById('resultShow').classList.add('lose');
    document.getElementById('sparks').innerHTML = '';
    document.getElementById('particles').innerHTML = '';
  }

  showScreen('resultScreen');
  setTimeout(() => {
    document.getElementById('resultScreen').classList.add('revealed');
  }, 100);
}

function buildSparks() {
  const wrap = document.getElementById('sparks');
  wrap.innerHTML = '';
  const positions = [
    [15,20],[80,15],[12,60],[85,55],[40,10],[60,8],[5,80],[92,78],[50,92],[25,85]
  ];
  positions.forEach(([x,y], i) => {
    const s = document.createElement('div');
    s.className = 'spark';
    s.textContent = '✦';
    s.style.left = x + '%';
    s.style.top = y + '%';
    s.style.animationDelay = (i * 0.2) + 's';
    s.style.fontSize = (8 + Math.random() * 8) + 'px';
    wrap.appendChild(s);
  });
}

function buildParticles() {
  const wrap = document.getElementById('particles');
  wrap.innerHTML = '';
  const colors = ['#b8963e','#e8c96a','#d4aa55','#fff8e0'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    p.style.left = (20 + Math.random() * 60) + '%';
    p.style.top = (30 + Math.random() * 30) + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
    p.style.setProperty('--ty', (Math.random() * -200 - 50) + 'px');
    p.style.animationDelay = (Math.random() * 0.4) + 's';
    p.style.width = p.style.height = (3 + Math.random() * 4) + 'px';
    wrap.appendChild(p);
  }
}

// ===== SCREEN CONTROL =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'revealed');
  });
  document.getElementById(id).classList.add('active');
}

// 長押し管理画面トリガー
let holdTimer = null;
const trigger = document.getElementById('staffTrigger');
trigger.addEventListener('touchstart', () => { holdTimer = setTimeout(() => showStaff(), 1500); });
trigger.addEventListener('touchend', () => clearTimeout(holdTimer));
trigger.addEventListener('mousedown', () => { holdTimer = setTimeout(() => showStaff(), 1500); });
trigger.addEventListener('mouseup', () => clearTimeout(holdTimer));

function showStaff() {
  packs = JSON.parse(localStorage.getItem('mgPacks') || 'null') || DEFAULT_PACKS;
  renderStaffUI();
  showScreen('staffScreen');
}

// ===== INIT =====
renderStaffUI();
</script>
